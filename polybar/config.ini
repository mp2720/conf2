[colors]
background = #1A1A1A
background-alt = #373B41
foreground = #D0D0D0
primary = #9BC0FF
ws_underline = #4688FA
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 17pt

# CHANGE:
dpi = 120

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

#border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2
# font-1 = "Font Awesome 6 Free:style=Solid:pixelsize=8;2"
font-1 = "Hack Nerd Font:style=Solid:pixelsize=8;2"

# CHANGE:
modules-left = xworkspaces i3 xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu wireguard wlan eth date battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
type = internal/i3
format = <label-mode>

[module/wireguard]
type = custom/script
# polybar stops if output is empty, so return string "wg off" when all interfaces are down
exec = sh -c 'interfaces=$(sudo wg-switch status); if [ -z "$interfaces" ]; then echo "wg off"; else echo "$interfaces"; fi'
interval = 2

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.ws_underline}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#9BC0FF}%mountpoint%%{F-} %percentage_used%% %used%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100

label-charging = %{F#9BC0FF}ÔÉßÔÉß%{F-} %percentage%%
label-discharging = %{F#9BC0FF}ÔČĄ%{F-} %percentage%%
#label-discharging = ÔČĄ %percentage%%
label-low = !ÔČĄ %percentage%%
format-charging = <label-charging>
format-discharging = <label-discharging>
format-low = <label-low>
format-full = ÔČĄ 100%
low-at = 20

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BATT
adapter = ACAD

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 1


[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄß "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%% %used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#9BC0FF}Ôáę%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#9BC0FF}Ôáę%{F-} %essid% %local_ip% %netspeed:8%

# interval = 2
# interval-fail = 2
# interval-if = 2

[module/date]
type = internal/date
interval = 1

#date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
date = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

